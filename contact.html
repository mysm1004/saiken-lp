<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>お問い合わせ｜弁護士法人 東京新橋法律事務所 債権回収</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@500;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f4f0e7;--white:#fbf8f1;--ink:#1a160f;--ink2:#3a342a;--mute:#6f6555;
  --rule:rgba(26,22,15,.16);--rule2:rgba(26,22,15,.30);
  --bronze:#8f6532;--bronzesoft:rgba(143,101,50,.10);
  --serif:"Noto Serif JP",serif;--sans:"Noto Sans JP",system-ui,sans-serif;--label:"Inter",sans-serif;
}
*{box-sizing:border-box}
html{-webkit-font-smoothing:antialiased}
body{margin:0;background:var(--paper);color:var(--ink);font-family:var(--sans);line-height:1.9;letter-spacing:.014em}
a{color:var(--bronze)}
.wrap{max-width:720px;margin:0 auto;padding:0 24px}
.label{font-family:var(--label);font-weight:700;letter-spacing:.2em;text-transform:uppercase;font-size:11.5px;color:var(--bronze)}
.site-header{background:rgba(244,240,231,.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--rule);position:sticky;top:0;z-index:10}
.site-header .wrap{max-width:1100px;display:flex;align-items:center;justify-content:space-between;height:72px}
.brand{display:flex;align-items:center;gap:13px}
.brand img{height:30px}
.brand .bt{font-weight:700;font-size:14px}
.back{font-weight:700;font-size:13.5px;color:var(--ink2)}
.back:hover{color:var(--bronze)}
@media(max-width:560px){.brand .bt{display:none}}
main{padding:54px 0 90px}
.intro{margin-bottom:32px}
.intro h1{font-family:var(--serif);font-weight:700;font-size:clamp(24px,3.6vw,34px);margin:14px 0 12px;line-height:1.5}
.intro p{font-size:14.5px;color:var(--ink2);margin:0;line-height:1.95}
.form-wrap{background:var(--white);border:1px solid var(--rule2);padding:clamp(24px,4vw,40px)}
.hs-form-frame{min-height:560px}
.hs-form-frame iframe{width:100%;border:0;min-height:560px}
.alt-contact{margin-top:26px;font-size:13px;color:var(--mute);line-height:1.9}
.alt-contact b{font-family:var(--label);font-weight:800;font-size:17px;color:var(--ink)}
footer{border-top:1px solid var(--rule);padding:34px 0;color:var(--mute);font-size:12px}
footer .wrap{max-width:1100px}
</style>
<script src="https://js-na2.hsforms.net/forms/embed/245657237.js" defer></script>
</head>
<body>
<header class="site-header">
  <div class="wrap">
    <div class="brand"><img src="img/logo_t.png" alt="弁護士法人 東京新橋法律事務所" /><span class="bt">弁護士法人 東京新橋法律事務所</span></div>
    <a href="index.html" class="back">← トップへ戻る</a>
  </div>
</header>
<main>
  <div class="wrap">
    <div class="intro">
      <span class="label">Contact</span>
      <h1>お問い合わせ</h1>
      <p>サービス内容のご確認・ご相談を承ります。下記フォームよりお送りください。担当者より折り返しご連絡いたします。</p>
    </div>
    <div class="form-wrap">
      <div class="hs-form-frame" data-region="na2" data-form-id="9c2348c8-8cae-4ae5-99a6-7c9d4774d0bb" data-portal-id="245657237"></div>
    </div>
    <div class="alt-contact">お電話でのご相談：平日 10:00–19:00 ／ <b>03-0000-0000</b></div>
  </div>
</main>
<footer>
  <div class="wrap">弁護士法人 東京新橋法律事務所 ／ 東京都中央区銀座8丁目20-33 ACN銀座8ビル3階 ／ 代表弁護士 前田 祥夢（東京弁護士会所属／登録番号 60429）</div>
</footer>
</body>
</html>
